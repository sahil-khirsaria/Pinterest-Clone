version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      - redis

  celery:
    build: .
    restart: unless-stopped
    command: celery -A cyclone.celery_task worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
    depends_on:
      - web

volumes:
  static_files: