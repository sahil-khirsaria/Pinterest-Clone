{% extends 'base.html' %}
{% load static %}
{% block title %}Pinterest | Email Verification Failed{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card text-center">
        <div style="font-size: 3rem; color: #e60023; margin-bottom: 1rem;"><i class="fa fa-times-circle"></i></div>
        <h2>Verification Failed</h2>
        <p class="auth-subtitle">The verification link is invalid or has expired.</p>
        <a href="{% url 'login' %}" class="btn-auth" style="display:block; text-decoration:none; text-align:center;">Go to Login</a>
    </div>
</div>
{% endblock %}
