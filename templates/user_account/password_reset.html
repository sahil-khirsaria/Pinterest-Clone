{% extends 'base.html' %}
{% load static %}
{% block title %}Pinterest | Reset Password{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card text-center">
        <img src="{% static 'img/logo.svg' %}" class="auth-logo" alt="Pinterest" width="40" height="40">
        <h2>Reset Password</h2>
        <p class="auth-subtitle">Enter your email and we'll send you instructions to reset your password.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Send Reset Email" class="btn-auth">
        </form>
        <a href="{% url 'login' %}" class="auth-link">Back to Login</a>
    </div>
</div>
{% endblock %}
