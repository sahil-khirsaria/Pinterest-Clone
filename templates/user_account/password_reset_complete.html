{% extends 'base.html' %}
{% load static %}
{% block title %}Pinterest | Password Reset Complete{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card text-center">
        <img src="{% static 'img/logo.svg' %}" class="auth-logo" alt="Pinterest" width="40" height="40">
        <h2>Password reset complete</h2>
        <p class="auth-subtitle">Your password has been set. You may now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn-auth" style="display:block; text-decoration:none; text-align:center;">Log in</a>
    </div>
</div>
{% endblock %}
