{% extends 'base.html' %}
{% load static %}
{% block title %}Pinterest | Delete Account{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card text-center">
        <h2 style="color: #e60023;">Delete Account</h2>
        <p class="auth-subtitle">Once you delete your account, there is no going back. Please be certain.</p>
        <form method="post" action="{% url 'users:delete_account' user_obj.username %}">
            {% csrf_token %}
            <input type="submit" value="Delete My Account" class="btn-auth" style="background-color: #e60023;">
        </form>
        <a href="{% url 'users:user_profile' user.id %}" class="auth-link" style="color: #333;">Cancel</a>
    </div>
</div>
{% endblock %}
