{% extends 'base.html' %}
{% load static %}
{% block title %}Pinterest | Change Password{% endblock %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="create-container">
        <h2><i class="fa fa-lock"></i> Change Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Change Password" class="btn-create">
        </form>
    </div>
</div>
{% endblock %}
