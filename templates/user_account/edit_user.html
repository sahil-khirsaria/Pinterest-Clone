{% extends 'base.html' %}
{% load static %}
{% block title %}Pinterest | Update Profile{% endblock %}
{% block content %}
<div class="container mt-5 mb-5">
    <div class="create-container">
        <h2><i class="fa fa-user"></i> Edit Profile</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            {{ profile_form.as_p }}
            <input type="submit" value="Save Changes" class="btn-create">
        </form>
    </div>
</div>
{% endblock %}
