{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Pinterest | Server Error</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .error-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 3rem 2.5rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: #e60023;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        h2 { font-weight: 700; font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
        p { color: #767676; font-size: 1rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .btn {
            display: inline-block;
            background-color: #e60023;
            color: #fff;
            padding: 0.6rem 2rem;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #ad081b; }
        @media (max-width: 576px) {
            .error-code { font-size: 4rem; }
            .error-card { padding: 2rem 1.5rem; }
            svg { width: 160px; height: 128px; }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 1.5rem;">
            <rect x="60" y="30" width="80" height="90" rx="8" fill="#FFF0F0" stroke="#FFD0D0" stroke-width="2"/>
            <rect x="70" y="45" width="60" height="8" rx="4" fill="#FFD0D0"/>
            <rect x="70" y="60" width="45" height="8" rx="4" fill="#FFD0D0"/>
            <rect x="70" y="75" width="55" height="8" rx="4" fill="#FFD0D0"/>
            <circle cx="100" cy="105" r="8" fill="#e60023" opacity="0.3"/>
            <path d="M96 103L100 107L104 103" stroke="#e60023" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M40 60C40 60 45 55 50 58" stroke="#FFB8B8" stroke-width="2" stroke-linecap="round"/>
            <path d="M150 50C150 50 155 45 160 48" stroke="#FFB8B8" stroke-width="2" stroke-linecap="round"/>
            <path d="M35 90L45 85M155 80L165 75" stroke="#FFD0D0" stroke-width="2" stroke-linecap="round"/>
            <text x="100" y="20" text-anchor="middle" font-size="20" fill="#e60023">&#9888;</text>
        </svg>
        <div class="error-code">500</div>
        <h2>Our servers are having a moment</h2>
        <p>Something broke on our end. Our team has been notified and we're working on it. Please try again in a few minutes.</p>
        <a href="/" class="btn">Back to safety</a>
    </div>
</body>
</html>
